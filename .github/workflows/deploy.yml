name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Optional: inject API keys from repo secrets so the live demo has AI enabled.
      # If the secrets are not set, the placeholders are simply removed and the app
      # runs in its offline (deterministic) mode — the link still works.
      - name: Inject API keys (optional)
        run: |
          sed -i "s|YOUR_GEMINI_KEY_HERE|${{ secrets.GEMINI_API_KEY }}|g" assets/js/ai.js
          sed -i "s|YOUR_GROQ_KEY_HERE|${{ secrets.GROQ_API_KEY }}|g" assets/js/ai.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
